version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atomiq_app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:atomiq_secret@postgres:5432/atomiq_db
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change_this_secret_in_production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - atomiq_network

  postgres:
    image: postgres:16-alpine
    container_name: atomiq_postgres
    environment:
      POSTGRES_DB: atomiq_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: atomiq_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - atomiq_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: atomiq_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@atomiq.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev
    networks:
      - atomiq_network

volumes:
  postgres_data:
    driver: local

networks:
  atomiq_network:
    driver: bridge
